<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Villasistent</title>

<link rel="stylesheet" href="styles.css">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

</head>

<body>

<!-- LOGIN SCREEN -->

<div id="loginScreen">

<h1>Villasistent</h1>

<button id="googleLogin">
Continue with Google
</button>

</div>

<!-- APP -->

<div id="app" style="display:none">

<div class="app">

<aside class="sidebar">

<div class="logo">
Villasistent
</div>

<button data-page="dashboardPage">🏠 Dashboard</button>
<button data-page="tasksPage">📋 Tasks</button>
<button data-page="habitsPage">🔥 Habits</button>
<button data-page="goalsPage">🎯 Goals</button>
<button data-page="categoriesPage">📂 Categories</button>
<button data-page="reflectionPage">🧠 Reflection</button>

<button id="logoutBtn">Logout</button>

</aside>

<div class="main">

<header class="topbar">

<h1>Villasistent</h1>

</header>

<main>

<section id="dashboardPage" class="page active">

<div class="dashboard-grid">

<div class="card progress-card">

<div class="circle">
<div class="percent">0%</div>
</div>

</div>

<div class="card stats">

<div class="stat">
<h2 id="totalTasks">0</h2>
<p>Total Tasks</p>
</div>

<div class="stat">
<h2 id="completedTasks">0</h2>
<p>Completed</p>
</div>

<div class="stat">
<h2 id="activeHabits">0</h2>
<p>Habits</p>
</div>

<div class="stat">
<h2 id="goalCount">0</h2>
<p>Goals</p>
</div>

</div>

</div>

<div class="card ai-card">

<h3>AI Suggestion</h3>
<p id="aiSuggestion">
Focus on deep work for 2 hours.
</p>

</div>

</section>

<section id="tasksPage" class="page">

<h2>Tasks</h2>

<input id="taskInput" placeholder="New task">
<button id="addTask">Add Task</button>

<ul id="taskList"></ul>

</section>

<section id="habitsPage" class="page">

<h2>Habits</h2>

<input id="habitInput" placeholder="New habit">
<button id="addHabit">Add Habit</button>

<ul id="habitList"></ul>

</section>

<section id="goalsPage" class="page">

<h2>Goals</h2>

<input id="goalInput" placeholder="New goal">
<button id="addGoal">Add Goal</button>

<ul id="goalList"></ul>

</section>

<section id="categoriesPage" class="page">

<h2>Categories</h2>

<input id="categoryInput" placeholder="New category">
<button id="addCategory">Add</button>

<ul id="categoryList"></ul>

</section>

<section id="reflectionPage" class="page">

<h2>Reflection</h2>

<textarea id="reflectionText"></textarea>

<button id="saveReflection">
Save Reflection
</button>

<ul id="reflectionHistory"></ul>

</section>

</main>

</div>

</div>

</div>

<script src="firebase.js"></script>
<script src="tasks.js"></script>
<script src="habits.js"></script>
<script src="goals.js"></script>
<script src="categories.js"></script>
<script src="reflection.js"></script>
<script src="dashboard.js"></script>
<script src="app.js"></script>

</body>
</html>
