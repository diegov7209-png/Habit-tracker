<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Villasistent</title>

<link rel="stylesheet" href="styles.css">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

</head>

<body>

<div class="app">

<!-- SIDEBAR -->

<aside class="sidebar" id="sidebar">

<div class="logo">
Villasistent
</div>

<nav>

<button data-page="dashboardPage">🏠 Dashboard</button>
<button data-page="tasksPage">📋 Tasks</button>
<button data-page="habitsPage">🔥 Habits</button>
<button data-page="goalsPage">🎯 Goals</button>
<button data-page="categoriesPage">📂 Categories</button>
<button data-page="reflectionPage">🧠 Reflection</button>

</nav>

</aside>


<!-- MAIN CONTENT -->

<div class="content">

<header class="topbar">

<button id="menuToggle" class="menu-btn">☰</button>

<h1 class="title">Villasistent</h1>

</header>


<main class="pages">

<!-- DASHBOARD -->

<section id="dashboardPage" class="page active">

<h2>Dashboard</h2>

<div class="dashboard-grid">

<div class="card">

<h3 id="totalTasks">0</h3>
<p>Total Tasks</p>

</div>

<div class="card">

<h3 id="completedTasks">0</h3>
<p>Completed</p>

</div>

<div class="card">

<h3 id="activeHabits">0</h3>
<p>Active Habits</p>

</div>

<div class="card">

<h3 id="goalCount">0</h3>
<p>Goals</p>

</div>

</div>

<div class="card ai-card">

<h3>Villasistent AI</h3>

<p id="aiSuggestion">Everything looks balanced. Keep executing.</p>

</div>

</section>


<!-- TASKS -->

<section id="tasksPage" class="page">

<h2>Tasks</h2>

<div class="tabs">

<button class="tab active">Today</button>
<button class="tab">Upcoming</button>
<button class="tab">Completed</button>

</div>

<div class="card task-create">

<input id="taskTitle" placeholder="Task title">

<select id="taskPriority">

<option>Low</option>
<option>Medium</option>
<option>High</option>

</select>

<input id="taskDeadline" type="date">

<button id="addTask" class="gradient-btn">
Add Task
</button>

</div>

<ul id="taskList"></ul>

</section>


<!-- HABITS -->

<section id="habitsPage" class="page">

<h2>Habits</h2>

<div class="card habit-create">

<input id="habitTitle" placeholder="Habit name">

<button id="addHabit" class="gradient-btn">
Add Habit
</button>

</div>

<ul id="habitList"></ul>

</section>


<!-- GOALS -->

<section id="goalsPage" class="page">

<h2>Goals</h2>

<div class="card goal-create">

<input id="goalTitle" placeholder="Goal title">

<textarea id="goalDesc" placeholder="Description"></textarea>

<button id="addGoal" class="gradient-btn">
Add Goal
</button>

</div>

<div id="goalList"></div>

</section>


<!-- CATEGORIES -->

<section id="categoriesPage" class="page">

<h2>Categories</h2>

<div class="card">

<input id="newCategory" placeholder="New category">

<button id="addCategory" class="gradient-btn">
Add
</button>

</div>

<ul id="categoryList"></ul>

</section>


<!-- REFLECTION -->

<section id="reflectionPage" class="page">

<h2>Reflection</h2>

<textarea id="reflectionText" placeholder="Write your thoughts..."></textarea>

<button id="saveReflection" class="gradient-btn">
Save Reflection
</button>

<div id="reflectionHistory"></div>

</section>


</main>

</div>

</div>


<script src="storage.js"></script>
<script src="tasks.js"></script>
<script src="habits.js"></script>
<script src="goals.js"></script>
<script src="ai.js"></script>
<script src="dashboard.js"></script>
<script src="app.js"></script>

</body>
</html>
