<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Villasistent</title>

<link rel="stylesheet" href="styles.css">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

</head>

<body>

<div class="app">

<aside class="sidebar">

<div class="logo">
Villasistent
</div>

<button data-page="dashboardPage">🏠 Dashboard</button>
<button data-page="tasksPage">📋 Tasks</button>
<button data-page="habitsPage">🔥 Habits</button>
<button data-page="goalsPage">🎯 Goals</button>
<button data-page="categoriesPage">📂 Categories</button>
<button data-page="reflectionPage">🧠 Reflection</button>

</aside>

<div class="main">

<header class="topbar">

<h1>Villasistent</h1>

</header>

<main>

<!-- DASHBOARD -->

<section id="dashboardPage" class="page active">

<div class="dashboard-grid">

<div class="card progress-card">

<div class="circle">

<div class="percent">0%</div>

</div>

</div>

<div class="card stats">

<div class="stat">

<h2 id="totalTasks">0</h2>
<p>Total Tasks</p>

</div>

<div class="stat">

<h2 id="completedTasks">0</h2>
<p>Completed</p>

</div>

<div class="stat">

<h2 id="activeHabits">0</h2>
<p>Habits</p>

</div>

<div class="stat">

<h2 id="goalCount">0</h2>
<p>Goals</p>

</div>

</div>

</div>

<div class="card ai-card">

<h3>AI Suggestion</h3>

<p id="aiSuggestion">
Focus on deep work for 2 hours.
</p>

</div>

</section>

<!-- TASKS -->

<section id="tasksPage" class="page">

<h2>Tasks</h2>

<input id="taskInput" placeholder="New task">

<button id="addTask">Add Task</button>

<ul id="taskList"></ul>

</section>

</main>

</div>

</div>

<script src="tasks.js"></script>
<script src="dashboard.js"></script>
<script src="app.js"></script>

</body>
</html>
